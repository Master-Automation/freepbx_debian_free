name: Auto-update README hash and version

on:
  push:
    paths:
      - 'russian.sh'
    branches:
      - master
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Calculate hash
        id: hash
        run: |
          HASH=$(sha256sum russian.sh | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "✅ Новый хеш: $HASH"
      
      - name: Update version.hash file
        run: |
          echo "${{ steps.hash.outputs.hash }}" > version.hash
          echo "✅ version.hash обновлён"
      
      - name: Update hash in README table
        run: |
          # Обновляем хеш в таблице README
          sed -i "s/`[a-f0-9]\{64\}`/`${{ steps.hash.outputs.hash }}`/" README.md
          echo "✅ Хеш в README обновлён"
      
      - name: Update hash status badge
        run: |
          # Опционально: обновляем бейдж статуса (он всегда зелёный, так как хеш актуален)
          sed -i "s|хеш-[а-я]*-|хеш-актуален-|" README.md
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.hash README.md
          git diff --cached --quiet || git commit -m "🤖 Автообновление хеша: ${{ steps.hash.outputs.hash }} [skip ci]"
          git push
