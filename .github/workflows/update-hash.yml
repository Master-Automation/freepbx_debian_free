name: Auto-update README hash and version

on:
  push:
    paths:
      - 'scripts/russian.sh' # Путь к скрипту в новой папке
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Рекомендую v4, v6 пока нет
        with:
          fetch-depth: 0
      
      - name: Calculate hash
        id: hash
        run: |
          # Считаем хеш файла внутри папки scripts/
          HASH=$(sha256sum scripts/russian.sh | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "✅ Хеш: $HASH"
      
      - name: Update version.hash file
        run: |
          # Сохраняем хеш в папку hash/
          echo "${{ steps.hash.outputs.hash }}" > hash/version.hash
          echo "✅ hash/version.hash обновлён"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем файл из папки hash/
          git add hash/version.hash
          
          if git diff --cached --quiet; then
            echo "ℹ️ Нет изменений для коммита"
          else
            git commit -m "🤖 Обновление version.hash [skip ci]"
            git push
            echo "✅ Изменения запушены"
          fi
