name: Auto-update README hash and version

on:
  push:
    paths:
      - 'russian.sh'
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Calculate hash
        id: hash
        run: |
          HASH=$(sha256sum russian.sh | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "✅ Хеш: $HASH"
      
      - name: Update version.hash file
        run: |
          echo "${{ steps.hash.outputs.hash }}" > version.hash
          echo "✅ version.hash обновлён"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.hash
          if git diff --cached --quiet; then
            echo "ℹ️ Нет изменений для коммита"
          else
            git commit -m "🤖 Обновление version.hash [skip ci]"
            git push
            echo "✅ Изменения запушены"
          fi
