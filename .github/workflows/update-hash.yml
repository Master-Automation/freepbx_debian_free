name: Auto-update README hash and version

on:
  push:
    paths:
      - 'russian.sh'
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version from script
        id: version
        run: |
          # Ищем строку с SCRIPT_VERSION
          VERSION=$(grep -oP 'SCRIPT_VERSION="\K[^"]+' russian.sh || echo "unknown")
          DATE=$(grep -oP 'SCRIPT_DATE="\K[^"]+' russian.sh || date +%Y-%m-%d)
          HASH=$(sha256sum russian.sh | cut -d' ' -f1)
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          
          echo "✅ Версия скрипта: $VERSION"
          echo "✅ Дата версии: $DATE"
          echo "✅ Хеш: ${HASH:0:16}..."
      
      - name: Update README
        run: |
          # Обновляем версию
          sed -i "s/Версия скрипта: [0-9.]*/Версия скрипта: ${{ steps.version.outputs.version }}/g" README.md
          sed -i "s/SCRIPT_VERSION=\"[0-9.]*\"/SCRIPT_VERSION=\"${{ steps.version.outputs.version }}\"/g" README.md
          
          # Обновляем дату
          sed -i "s/Дата релиза: [0-9-]*/Дата релиза: ${{ steps.version.outputs.date }}/g" README.md
          
          # Обновляем хеш
          sed -i "s/EXPECTED=\"[a-f0-9]*\"/EXPECTED=\"${{ steps.version.outputs.hash }}\"/g" README.md
          sed -i "s/248bace4de3f816c6685ccdccd55dd8afadb2a7812934141c8e2cc878406c292/${{ steps.version.outputs.hash }}/g" README.md
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "🤖 Обновление до версии ${{ steps.version.outputs.version }} [skip ci]"
          git push
