jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current version
        id: version
        run: |
          VERSION=$(grep 'SCRIPT_VERSION="' russian.sh | cut -d'"' -f2 | tr -d ' \t\n\r')
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "current=${VERSION}" >> $GITHUB_OUTPUT

      - name: Increment patch version
        id: new
        run: |
          CURRENT="${{ steps.version.outputs.current }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "version=${NEW}" >> $GITHUB_OUTPUT

      - name: Update script
        run: |
          sed -i "s/SCRIPT_VERSION=\"[0-9.]*\"/SCRIPT_VERSION=\"${{ steps.new.outputs.version }}\"/" russian.sh
          sed -i "s/SCRIPT_DATE=\"[0-9-]*\"/SCRIPT_DATE=\"$(date +%Y-%m-%d)\"/" russian.sh

      - name: Update script version badge in README
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          sed -i "s/script-[0-9.]*-brightgreen/script-${NEW_VERSION}-brightgreen/" README.md
          sed -i "s/Установок v[0-9.]*/Установок v${NEW_VERSION}/" README.md
          sed -i "s/version=[0-9.]*/version=${NEW_VERSION}/" README.md
          sed -i "s/версия [0-9.]*/версия ${NEW_VERSION}/" README.md
          echo "✅ README обновлён до версии ${NEW_VERSION}"

      - name: Update version.hash
        run: |
          sha256sum russian.sh | awk '{print $1}' > version.hash

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add russian.sh README.md version.hash
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🔖 Bump version to ${{ steps.new.outputs.version }} [skip ci]"
          git pull --rebase --autostash
          git push
