# .github/workflows/auto-version.yml
name: Auto-version

on:
  push:
    paths:
      - 'russian.sh'
    branches:
      - master
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current russian
        id: ver_russian
        run: |
          VERSION=$(grep 'SCRIPT_VERSION="' russian.sh | head -1 | cut -d'"' -f2)
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Increment patch russian
        id: new_russian
        run: |
          CURRENT="${{ steps.ver_russian.outputs.current }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW" >> $GITHUB_OUTPUT

      - name: Update russian.sh version
        run: |
          sed -i "s/SCRIPT_VERSION=\"[0-9.]*\"/SCRIPT_VERSION=\"${{ steps.new_russian.outputs.version }}\"/" russian.sh

      - name: Update russian.hash
        run: |
          sha256sum russian.sh | awk '{print $1}' > russian.hash

      - name: Update README badge
        run: |
          NEW_VER="${{ steps.new_russian.outputs.version }}"
          sed -i "s/-[0-9]\+\.[0-9]\+\.[0-9]\+-brightgreen/-$NEW_VER-brightgreen/" README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add russian.sh russian.hash README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          COMMIT_MSG="🔖 Bump russian version to ${{ steps.new_russian.outputs.version }} [skip ci]"
          git commit -m "$COMMIT_MSG"
          git pull --rebase origin master
          git push origin master
