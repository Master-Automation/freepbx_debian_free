# .github/workflows/auto-version.yml
name: Auto-version

on:
  push:
    paths:
      - 'russian.sh'
    branches:
      - master
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: ver
        run: |
          VER=$(grep 'SCRIPT_VERSION="' russian.sh | head -1 | cut -d'"' -f2)
          echo "current=$VER" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          OLD="${{ steps.ver.outputs.current }}"
          MAJOR=$(echo $OLD | cut -d. -f1)
          MINOR=$(echo $OLD | cut -d. -f2)
          PATCH=$(echo $OLD | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH+1))"
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Update files
        run: |
          NEW="${{ steps.bump.outputs.new }}"
          sed -i "s/SCRIPT_VERSION=\"[0-9.]*\"/SCRIPT_VERSION=\"$NEW\"/" russian.sh
          sed -i "s/script-[0-9.]*-brightgreen/script-$NEW-brightgreen/" README.md
          sed -i "s/Установок v[0-9.]*/Установок v$NEW/" README.md
          sha256sum russian.sh | awk '{print $1}' > version.hash

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add russian.sh README.md version.hash
          git commit -m "Bump version to ${{ steps.bump.outputs.new }} [skip ci]" || exit 0
          git pull --rebase
          git push
