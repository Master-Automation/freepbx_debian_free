name: Auto-version

on:
  push:
    paths:
      - 'scripts/main/install.sh'
      - 'scripts/main/russian.sh'
      - 'scripts/utils/debug.sh'
      - 'scripts/utils/report.sh'
      - 'scripts/utils/system-pre-check.sh'
    branches:
      - master
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- 1. install.sh ---
      - name: Process install.sh
        id: proc_install
        run: |
          VERSION=$(grep 'VERSION="' scripts/main/install.sh | head -1 | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/VERSION=\"[0-9.]*\"/VERSION=\"$NEW_VER\"/" scripts/main/install.sh
          sha256sum scripts/main/install.sh | awk '{print $1}' > hash/install.hash
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      # --- 2. russian.sh ---
      - name: Process russian.sh
        id: proc_russian
        run: |
          VERSION=$(grep 'SCRIPT_VERSION="' scripts/main/russian.sh | head -1 | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/SCRIPT_VERSION=\"[0-9.]*\"/SCRIPT_VERSION=\"$NEW_VER\"/" scripts/main/russian.sh
          sha256sum scripts/main/russian.sh | awk '{print $1}' > hash/russian.hash
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      # --- 3. debug.sh ---
      - name: Process debug.sh
        id: proc_debug
        run: |
          VERSION=$(grep 'VERSION="' scripts/utils/debug.sh | head -1 | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/VERSION=\"[0-9.]*\"/VERSION=\"$NEW_VER\"/" scripts/utils/debug.sh
          sha256sum scripts/utils/debug.sh | awk '{print $1}' > hash/debug.hash
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      # --- 4. report.sh ---
      - name: Process report.sh
        id: proc_report
        run: |
          VERSION=$(grep 'VERSION="' scripts/utils/report.sh | head -1 | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/VERSION=\"[0-9.]*\"/VERSION=\"$NEW_VER\"/" scripts/utils/report.sh
          sha256sum scripts/utils/report.sh | awk '{print $1}' > hash/report.hash
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      # --- 5. system-pre-check.sh ---
      - name: Process pre-check
        id: proc_check
        run: |
          VERSION=$(grep 'VERSION="' scripts/utils/system-pre-check.sh | head -1 | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/VERSION=\"[0-9.]*\"/VERSION=\"$NEW_VER\"/" scripts/utils/system-pre-check.sh
          sha256sum scripts/utils/system-pre-check.sh | awk '{print $1}' > hash/system-pre-check.hash
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      # ----------------- Update README -----------------
      - name: Update README
        run: |
          README="docs/README.md"
          VER_RUSSIAN="${{ steps.proc_russian.outputs.version }}"
          VER_INSTALL="${{ steps.proc_install.outputs.version }}"
          VER_DEBUG="${{ steps.proc_debug.outputs.version }}"
          VER_REPORT="${{ steps.proc_report.outputs.version }}"
          VER_CHECK="${{ steps.proc_check.outputs.version }}"

          # Обновление бейджей в таблице (по ключевым словам)
          sed -i "/Установщик/s/badge\/-[0-9.]\+-brightgreen/badge\/-$VER_INSTALL-brightgreen/" $README
          sed -i "/Russian/s/badge\/-[0-9.]\+-brightgreen/badge\/-$VER_RUSSIAN-brightgreen/" $README
          sed -i "/Отладчик/s/badge\/-[0-9.]\+-blue/badge\/-$VER_DEBUG-blue/" $README
          sed -i "/Отчёт/s/badge\/-[0-9.]\+-blue/badge\/-$VER_REPORT-blue/" $README
          sed -i "/Предпроверка/s/badge\/-[0-9.]\+-blue/badge\/-$VER_CHECK-blue/" $README

          # Обновление счетчика версии (Hits в таблице)
          # Меняем и текст бейджа в строке, и параметр version= в ссылке
          sed -i "/Успешных установок/s/badge\/-[0-9.]\+-brightgreen/badge\/-$VER_RUSSIAN-brightgreen/g" $README
          sed -i "s/version%3D[0-9.]\+/version%3D$VER_RUSSIAN/g" $README

      # ----------------- Commit and push -----------------
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/main/*.sh scripts/utils/*.sh hash/*.hash docs/README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🔖 Bump versions & update README table [skip ci]"
          git pull --rebase origin master
          git push origin master
