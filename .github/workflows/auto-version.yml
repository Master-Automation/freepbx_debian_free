# .github/workflows/auto-version.yml
name: Auto-version

on:
  push:
    paths:
      - 'russian.sh'
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current version
        id: version
        run: |
          # Ищем строку SCRIPT_VERSION="X.X" и извлекаем номер версии
          VERSION=$(grep -E 'SCRIPT_VERSION="[0-9.]+"' russian.sh | sed -E 's/.*"([0-9.]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "current=$VERSION" >> $GITHUB_OUTPUT
          echo "Текущая версия: $VERSION"

      - name: Increment patch version
        id: new
        run: |
          CURRENT="${{ steps.version.outputs.current }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Новая версия: $NEW"

      - name: Update script
        run: |
          sed -i "s/SCRIPT_VERSION=\"[0-9.]*\"/SCRIPT_VERSION=\"${{ steps.new.outputs.version }}\"/" russian.sh
          sed -i "s/SCRIPT_DATE=\"[0-9-]*\"/SCRIPT_DATE=\"$(date +%Y-%m-%d)\"/" russian.sh
          echo "✅ Скрипт обновлён до версии ${{ steps.new.outputs.version }}"

      - name: Update script version badge in README
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          sed -i "s/script-[0-9.]*-brightgreen/script-${NEW_VERSION}-brightgreen/" README.md
          echo "✅ Бейдж версии скрипта обновлён: ${NEW_VERSION}"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add russian.sh README.md
          git diff --staged --quiet || git commit -m "🔖 Bump version to ${{ steps.new.outputs.version }} [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push
