name: Auto-version

on:
  push:
    paths:
      - 'scripts/main/install.sh'
      - 'scripts/main/russian.sh'
      - 'scripts/utils/debug.sh'
      - 'scripts/utils/report.sh'
      - 'scripts/utils/system-pre-check.sh'
    branches:
      - master
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------- 1. install.sh (main) -----------------
      - name: Process install.sh
        id: proc_install
        run: |
          VERSION=$(grep 'VERSION="' scripts/main/install.sh | head -1 | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/VERSION=\"[0-9.]*\"/VERSION=\"$NEW_VER\"/" scripts/main/install.sh
          sha256sum scripts/main/install.sh | awk '{print $1}' > hash/install.hash
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      # ----------------- 2. russian.sh (main) -----------------
      - name: Process russian.sh
        id: proc_russian
        run: |
          VERSION=$(grep 'SCRIPT_VERSION="' scripts/main/russian.sh | head -1 | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/SCRIPT_VERSION=\"[0-9.]*\"/SCRIPT_VERSION=\"$NEW_VER\"/" scripts/main/russian.sh
          sha256sum scripts/main/russian.sh | awk '{print $1}' > hash/russian.hash
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      # ----------------- 3. debug.sh (utils) -----------------
      - name: Process debug.sh
        id: proc_debug
        run: |
          VERSION=$(grep 'VERSION="' scripts/utils/debug.sh | head -1 | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/VERSION=\"[0-9.]*\"/VERSION=\"$NEW_VER\"/" scripts/utils/debug.sh
          sha256sum scripts/utils/debug.sh | awk '{print $1}' > hash/debug.hash
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      # ----------------- 4. report.sh (utils) -----------------
      - name: Process report.sh
        id: proc_report
        run: |
          VERSION=$(grep 'VERSION="' scripts/utils/report.sh | head -1 | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/VERSION=\"[0-9.]*\"/VERSION=\"$NEW_VER\"/" scripts/utils/report.sh
          sha256sum scripts/utils/report.sh | awk '{print $1}' > hash/report.hash
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      # ----------------- 5. system-pre-check.sh (utils) -----------------
      - name: Process system-pre-check.sh
        id: proc_check
        run: |
          VERSION=$(grep 'VERSION="' scripts/utils/system-pre-check.sh | head -1 | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/VERSION=\"[0-9.]*\"/VERSION=\"$NEW_VER\"/" scripts/utils/system-pre-check.sh
          sha256sum scripts/utils/system-pre-check.sh | awk '{print $1}' > hash/system-pre-check.hash
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      # ----------------- Update README badges -----------------
        
      - name: Update README badges
        run: |
          V_INSTALL="${{ steps.proc_install.outputs.version }}"
          V_RUSSIAN="${{ steps.proc_russian.outputs.version }}"
          V_DEBUG="${{ steps.proc_debug.outputs.version }}"
          V_REPORT="${{ steps.proc_report.outputs.version }}"
          V_CHECK="${{ steps.proc_check.outputs.version }}"

          # РџСѓС‚СЊ Рє С„Р°Р№Р»Сѓ
          README="docs/README.md"

          # 1. РћР±РЅРѕРІР»СЏРµРј Р±РµР№РґР¶Рё РІ С‚Р°Р±Р»РёС†Рµ (РёС‰РµРј РїРѕ РЅР°Р·РІР°РЅРёСЋ Рё РјРµРЅСЏРµРј РІРµСЂСЃРёСЋ СЂСЏРґРѕРј)
          sed -i "s/\(Installer.*badge\/-\)[0-9.]\+/\1$V_INSTALL/g" $README
          sed -i "s/\(Installer.*badge\/-\)[0-9.]\+/\1$V_RUSSIAN/g" $README # Р”Р»СЏ РІС‚РѕСЂРѕР№ СЃС‚СЂРѕРєРё РІ С‚Р°Р±Р»РёС†Рµ
          sed -i "s/\(Debug.*badge\/-\)[0-9.]\+/\1$V_DEBUG/g" $README
          sed -i "s/\(Report.*badge\/-\)[0-9.]\+/\1$V_REPORT/g" $README
          
          # Р•СЃР»Рё РґРѕР±Р°РІРёС‚Рµ СЃС‚СЂРѕРєСѓ РґР»СЏ Pre-Check:
          sed -i "s/\(Pre--Check.*badge\/-\)[0-9.]\+/\1$V_CHECK/g" $README

          # 2. РћР±РЅРѕРІР»СЏРµРј РІРµСЂСЃРёСЋ РІ С‚РµРєСЃС‚Рµ Рё СЃСЃС‹Р»РєР°С… (СЃС‡РµС‚С‡РёРє Hits)
          sed -i "s/РІРµСЂСЃРёРё [0-9.]\+/РІРµСЂСЃРёРё $V_RUSSIAN/g" $README
          sed -i "s/version%3D[0-9.]\+/version%3D$V_RUSSIAN/g" $README

 
      # ----------------- Commit and push -----------------
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          git add scripts/main/*.sh scripts/utils/*.sh hash/*.hash docs/README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "рџ”– Bump versions and update hashes [skip ci]"
          git pull --rebase origin master
          git push origin master
